name: Build Bullpen IPA

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Xcode 선택
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: XcodeGen 설치
        run: brew install xcodegen

      - name: xcodeproj 생성
        run: xcodegen generate

      - name: 빌드
        run: |
          xcodebuild -project Bullpen.xcodeproj \
            -scheme Bullpen \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            VALIDATE_PRODUCT=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: IPA 생성
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "*.app" -maxdepth 1 | sort | tail -1)
          APP_NAME=$(basename "$APP_PATH")
          rm -rf Payload build/ipa
          mkdir -p build/ipa Payload
          cp -r "$APP_PATH" Payload/
          chmod -R 755 "Payload/$APP_NAME"
          zip -r "build/ipa/Bullpen.ipa" Payload

      - name: Release 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: build/ipa/Bullpen.ipa
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 텔레그램 알림 발송
        # 비밀값을 쉘 환경 변수로 확실하게 주입합니다
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/latest/Bullpen.ipa"
          INSTALL_URL="https://sign.kravasign.com/?url=$IPA_URL"
          MESSAGE="🚀 빌드 완료! 아래 링크를 눌러 설치하세요.
          
          $INSTALL_URL"
          
          # 변수를 $BOT_TOKEN과 $CHAT_ID로 사용합니다
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MESSAGE"
