name: Build Bullpen IPA

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: macos-15
    # Release 업로드를 위해 권한 설정 필수
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Xcode 선택
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: XcodeGen 설치
        run: brew install xcodegen

      - name: xcodeproj 생성
        run: xcodegen generate

      - name: 빌드
        run: |
          xcodebuild -project Bullpen.xcodeproj \
            -scheme Bullpen \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            VALIDATE_PRODUCT=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: IPA 생성
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "*.app" -maxdepth 1 | sort | tail -1)
          APP_NAME=$(basename "$APP_PATH")
          rm -rf Payload build/ipa
          mkdir -p build/ipa Payload
          cp -r "$APP_PATH" Payload/
          chmod -R 755 "Payload/$APP_NAME"
          # Krava 연동을 위해 파일명을 Bullpen.ipa로 고정
          zip -r "build/ipa/Bullpen.ipa" Payload

      - name: Release 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: build/ipa/Bullpen.ipa
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 텔레그램 알림 발송
        run: |
          # 1. 고정된 IPA 직접 다운로드 주소
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/latest/Bullpen.ipa"
          
          # 2. 설치 스킴 설정
          # 만약 krava:// 가 작동하지 않는다면 esign:// 또는 feather:// 로 변경해 보세요.
          INSTALL_URL="krava://import?url=$IPA_URL"
          
          # 3. 텔레그램 메시지 (HTML 방식이 링크 렌더링에 훨씬 강합니다)
          MESSAGE="<b>🚀 빌드 완료!</b>%0A%0A<a href='$INSTALL_URL'>👉 [여기를 눌러 Krava로 즉시 설치]</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML"

      - name: 다운로드 링크 summary 출력
        run: |
          echo "### 불펜 IPA 빌드 결과" >> "$GITHUB_STEP_SUMMARY"
          echo "[직접 다운로드 링크](https://github.com/${{ github.repository }}/releases/download/latest/Bullpen.ipa)" >> "$GITHUB_STEP_SUMMARY"
