name: Build Bullpen IPA

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - .gitignore
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Restore DerivedData cache
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-cache-${{ github.workflow }}-${{ github.sha }}
          restore-keys: xcode-cache-${{ github.workflow }}-
          deriveddata-directory: build/DerivedData

      - name: Import signing credentials
        env:
          DIST_CERT_P12_B64: ${{ secrets.DIST_CERT_P12_B64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          DEV_CERT_P12_B64: ${{ secrets.DEV_CERT_P12_B64 }}
          DEV_CERT_PASSWORD: ${{ secrets.DEV_CERT_PASSWORD }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail

          test -n "$DIST_CERT_P12_B64"
          test -n "$DIST_CERT_PASSWORD"
          test -n "$DEV_CERT_P12_B64"
          test -n "$DEV_CERT_PASSWORD"
          test -n "$ASC_KEY_BASE64"
          test -n "$ASC_KEY_ID"
          test -n "$ASC_ISSUER_ID"

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          mkdir -p /tmp/asc
          echo -n "$ASC_KEY_BASE64" | base64 --decode > /tmp/asc/key.p8
          echo -n "$DIST_CERT_P12_B64" | base64 --decode > /tmp/dist_cert.p12
          echo -n "$DEV_CERT_P12_B64" | base64 --decode > /tmp/dev_cert.p12

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security import /tmp/dist_cert.p12 -k "$KEYCHAIN_PATH" -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security import /tmp/dev_cert.p12 -k "$KEYCHAIN_PATH" -P "$DEV_CERT_PASSWORD" -T /usr/bin/codesign

          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" > /tmp/signing-identities.txt

          grep -Eq "Apple Development" /tmp/signing-identities.txt
          echo "SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
          APP_DEVELOPMENT_TEAM: ${{ secrets.APP_DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail

          BUNDLE_ID="${APP_BUNDLE_ID:-com.bullpen.app}"
          : "${APP_DEVELOPMENT_TEAM:?APP_DEVELOPMENT_TEAM secret is required}"
          TEAM_ID="$APP_DEVELOPMENT_TEAM"

          xcodebuild archive \
            -project Bullpen.xcodeproj \
            -scheme Bullpen \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Bullpen.xcarchive" \
            -derivedDataPath build/DerivedData \
            -jobs $(sysctl -n hw.logicalcpu) \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc/key.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            VALIDATE_PRODUCT=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain $SIGNING_KEYCHAIN_PATH"

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_DEVELOPMENT_TEAM: ${{ secrets.APP_DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail

          : "${APP_DEVELOPMENT_TEAM:?APP_DEVELOPMENT_TEAM secret is required}"
          TEAM_ID="$APP_DEVELOPMENT_TEAM"

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Bullpen.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc/key.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload IPA to OTA server
        if: success()
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}
          UPLOAD_SECRET: ${{ secrets.UPLOAD_SECRET }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
        run: |
          set -euo pipefail

          [ -z "${SERVER_URL:-}" ] && exit 0
          BUNDLE_ID="${APP_BUNDLE_ID:-com.bullpen.app}"
          curl -sS --fail-with-body -X POST "${SERVER_URL%/}/ota/upload" \
            -H "x-upload-secret: $UPLOAD_SECRET" \
            -H "x-bundle-id: $BUNDLE_ID" \
            -H "x-bundle-name: Bullpen" \
            -H "x-bundle-version: 1.0.0" \
            -H "x-repo: ${{ github.repository }}" \
            -H "x-branch: ${{ github.ref_name }}" \
            -H "x-run-id: ${{ github.run_id }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$RUNNER_TEMP/ipa/Bullpen.ipa"

      - name: Notify backend
        if: always()
        env:
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
          SERVER_URL: ${{ secrets.SERVER_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          [ -z "${SERVER_URL:-}" ] && exit 0
          [ -z "${NOTIFY_SECRET:-}" ] && exit 0

          HAS_IPA=false
          [ -f "$RUNNER_TEMP/ipa/Bullpen.ipa" ] && HAS_IPA=true

          BODY=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg status "$JOB_STATUS" \
            --argjson has_ipa "$HAS_IPA" \
            --arg commit_sha "${{ github.sha }}" \
            --arg commit_message "${{ github.event.head_commit.message }}" \
            '{repo:$repo,branch:$branch,run_id:$run_id,status:$status,has_ipa:$has_ipa,commit_sha:$commit_sha,commit_message:$commit_message}')

          curl --fail-with-body --retry 3 --retry-delay 2 -sS -X POST "${SERVER_URL%/}/webhook/github-actions" \
            -H "Content-Type: application/json" \
            -H "x-notify-secret: $NOTIFY_SECRET" \
            -d "$BODY"
