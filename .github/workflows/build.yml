name: Build Bullpen IPA

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - .gitignore

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Xcode 선택
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: 빌드
        run: |
          xcodebuild -project Bullpen.xcodeproj \
            -scheme Bullpen \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -jobs $(sysctl -n hw.logicalcpu) \
            build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            VALIDATE_PRODUCT=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: IPA 생성
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "*.app" -maxdepth 1 | sort | tail -1)
          APP_NAME=$(basename "$APP_PATH")
          rm -rf Payload build/ipa
          mkdir -p build/ipa Payload
          cp -r "$APP_PATH" Payload/
          chmod -R 755 "Payload/$APP_NAME"
          zip -r "build/ipa/${APP_NAME%.app}.ipa" Payload

      - name: IPA 업로드
        uses: actions/upload-artifact@v4
        with:
          name: Bullpen-ipa
          path: build/ipa/*.ipa

      - name: 다운로드 링크 summary 출력
        run: |
          echo "### 불펜 IPA" >> "$GITHUB_STEP_SUMMARY"
          echo "[다운로드](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
