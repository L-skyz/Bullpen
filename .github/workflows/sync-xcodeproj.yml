name: Sync Xcode Project

on:
  push:
    branches:
      - master
      - main
    paths:
      - project.yml
      - .github/workflows/sync-xcodeproj.yml
      - .gitignore
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-26
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: XcodeGen 설치
        run: brew install xcodegen

      - name: xcodeproj 생성
        run: xcodegen generate

      - name: 변경 확인
        id: diff
        run: |
          if [ -f Bullpen.xcodeproj/project.pbxproj ]; then
            git add -N Bullpen.xcodeproj/project.pbxproj
          fi
          if git diff --quiet -- Bullpen.xcodeproj/project.pbxproj; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: project.pbxproj 커밋
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f Bullpen.xcodeproj/project.pbxproj
          git commit -m "Sync generated Xcode project [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
