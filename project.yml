name: Bullpen

options:
  bundleIdPrefix: com.bullpen
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  developmentLanguage: ko

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: YES
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  Bullpen:
    type: application
    platform: iOS
    sources:
      - path: Bullpen
        excludes:
          - Resources/Assets.xcassets
    resources:
      - Bullpen/Resources/Assets.xcassets
    dependencies:
      - package: SwiftSoup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bullpen.app
        INFOPLIST_FILE: Bullpen/Resources/Info.plist
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          VALIDATE_PRODUCT: NO

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.0"

schemes:
  Bullpen:
    build:
      targets:
        Bullpen: all
    run:
      config: Debug
    archive:
      config: Release
